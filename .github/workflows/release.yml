name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without leading v"
        required: true
      ref:
        description: "Git ref to publish from, such as v1.7.0"
        required: false

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.version || '' }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish-npm:
    name: Publish ${{ matrix.package }} to npm
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      # Publish core first so dependents can resolve the pinned version.
      max-parallel: 1
      matrix:
        include:
          - package: "@cortexkit/antigravity-auth-core"
            workspace: "@cortexkit/antigravity-auth-core"
          - package: "@cortexkit/opencode-antigravity-auth"
            workspace: "@cortexkit/opencode-antigravity-auth"
          - package: "@cortexkit/pi-antigravity-auth"
            workspace: "@cortexkit/pi-antigravity-auth"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure latest npm (for trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Resolve release version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync version
        run: node scripts/version-sync.mjs "${{ steps.version.outputs.version }}"

      - name: Build
        run: npm run build

      - name: Check whether package version is already published
        id: published
        run: |
          if npm view "${{ matrix.package }}@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.package }}@${{ steps.version.outputs.version }} is already published; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Uses npm Trusted Publishing (OIDC) configured on npmjs.com.
      # Each package runs in a separate matrix job so npm obtains a package-scoped
      # OIDC publish token for that package instead of reusing the previous one.
      - name: Publish package to npm
        if: steps.published.outputs.exists != 'true'
        run: npm publish --workspace "${{ matrix.workspace }}" --access public --provenance

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
